spring:
  application:
    name: client-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/tech-challenge
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        default-requeue-rejected: false
  datasource:
    url: jdbc:postgresql://client-service-db:5432/client-service-db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
app:
  rabbit:
    exchange: ex.main
    queues:
      in:
        orquestradorClientes: Orquestrador-Clientes.queue
      out:
        clientesOrquestrador: Clientes-Orquestrador.queue

server:
  port: 0
  error:
    include-stacktrace: never
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://service-registry:8762/eureka

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
