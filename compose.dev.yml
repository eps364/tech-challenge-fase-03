      - "touch /tmp/.stamp; (while sleep 2; do find /workspace/api-gateway/src -name '*.java' -newer /tmp/.stamp 2>/dev/null | grep -q . && mvn compile -pl api-gateway -am -DskipTests -q && touch /tmp/.stamp; done) & mvn spring-boot:run -pl api-gateway -DskipTests -Dspring-boot.run.fork=false -Dspring-boot.devtools.restart.enabled=true"
    ports:
      - "8761:8761"
    volumes:
      - .:/workspace
      - m2-cache:/root/.m2
    environment:
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
      - SPRING_DEVTOOLS_RESTART_POLL_INTERVAL=2000
      - SPRING_DEVTOOLS_RESTART_QUIET_PERIOD=1000
      - SPRING_PROFILES_ACTIVE=dev
      - MAVEN_OPTS=-XX:+TieredCompilation -XX:TieredStopAtLevel=4 -Xms256m -Xmx512m
    networks:
      - fase3net
    depends_on:
      service-registry:
        condition: service_healthy
      redis:
        condition: service_healthy

