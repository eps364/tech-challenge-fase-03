services:
  service-registry:
    build: null
    image: maven:3.9.9-eclipse-temurin-21
    working_dir: /workspace/service-registry
    command: mvn spring-boot:run
    volumes:
      - ./service-registry:/workspace/service-registry
      - ./pom.xml:/workspace/pom.xml:ro
      - ~/.m2:/root/.m2
    environment:
      - SPRING_PROFILES_ACTIVE=dev

