
# Compose override para desenvolvimento: apenas serviços Java com hot reload
services:
  service-registry:
    build:
      context: .
      dockerfile: service-registry/Dockerfile
      target: dev
    volumes:
      - .:/workspace
      - m2-cache:/root/.m2
    environment:
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
      - SPRING_DEVTOOLS_RESTART_POLL_INTERVAL=2000
      - SPRING_DEVTOOLS_RESTART_QUIET_PERIOD=1000
      - SPRING_PROFILES_ACTIVE=dev
      - MAVEN_OPTS=-XX:+TieredCompilation -XX:TieredStopAtLevel=4 -Xms256m -Xmx512m
    networks:
      - fase3net
  api-gateway:
