# Usage: docker compose -f compose.yml -f compose.dev.yml up
#
# DO NOT use --build with this file. The application services use the official
# maven:3.9.9-eclipse-temurin-21 image from Docker Hub. Using --build would
# compile the Dockerfiles from compose.yml (JRE-only images) and tag them as
# the Maven image, removing 'mvn' from PATH and breaking hot reload.
#
# To rebuild only infrastructure (e.g. Keycloak):
#   docker compose -f compose.yml -f compose.dev.yml build keycloak
#   docker compose -f compose.yml -f compose.dev.yml up
#
# Overrides application services to run via Maven with Spring DevTools hot reload.
# Infrastructure (DBs, RabbitMQ, Keycloak, procpag) is provided by compose.yml.

services:
  service-registry:
    build: null
    image: maven:3.9.9-eclipse-temurin-21
    entrypoint: []
    working_dir: /workspace
    command: mvn spring-boot:run -pl service-registry -DskipTests -Dspring-boot.run.fork=false
    volumes:
      - .:/workspace
      - m2-cache:/root/.m2
    environment:
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
      - SPRING_DEVTOOLS_RESTART_POLL_INTERVAL=2000
      - SPRING_DEVTOOLS_RESTART_QUIET_PERIOD=1000
      - SPRING_PROFILES_ACTIVE=dev
      - MAVEN_OPTS=-XX:+TieredCompilation -XX:TieredStopAtLevel=4 -Xms256m -Xmx512m

  api-gateway:
