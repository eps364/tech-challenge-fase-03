# Usage: docker compose -f compose.yml -f compose.dev.yml up
# Para subir apenas um serviço em modo dev:
#   docker compose -f compose.yml -f compose.dev.yml up order-service
#
# DO NOT use --build with this file. The application services use the official
# maven:3.9.9-eclipse-temurin-21 image from Docker Hub. Using --build would
# compile the Dockerfiles from compose.yml (JRE-only images) and tag them as
# the Maven image, removing 'mvn' from PATH and breaking hot reload.
#
# To rebuild only infrastructure (e.g. Keycloak):
#   docker compose -f compose.yml -f compose.dev.yml build keycloak
#   docker compose -f compose.yml -f compose.dev.yml up
#
# Overrides application services to run via Maven with Spring DevTools hot reload.
# Infrastructure (DBs, RabbitMQ, Keycloak, procpag) is provided by compose.yml.

services:
  service-registry:
    build: null
    image: maven:3.9.9-eclipse-temurin-21
    entrypoint: []
    working_dir: /workspace
    command:
      - bash
      - -c
      - "touch /tmp/.stamp; (while sleep 2; do find /workspace/service-registry/src -name '*.java' -newer /tmp/.stamp 2>/dev/null | grep -q . && mvn compile -pl service-registry -am -DskipTests -q && touch /tmp/.stamp; done) & mvn spring-boot:run -pl service-registry -DskipTests -Dspring-boot.run.fork=false -Dspring-boot.devtools.restart.enabled=true"
    ports:
      - "8762:8762"
    volumes:
      - .:/workspace
      - m2-cache:/root/.m2
    environment:
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
      - SPRING_DEVTOOLS_RESTART_POLL_INTERVAL=2000
      - SPRING_DEVTOOLS_RESTART_QUIET_PERIOD=1000
      - SPRING_PROFILES_ACTIVE=dev
      - MAVEN_OPTS=-XX:+TieredCompilation -XX:TieredStopAtLevel=4 -Xms256m -Xmx512m
    # Aumenta tolerância para o startup lento do Maven (cold cache ~3-5min, warm ~30s)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8762/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - fase3net

  api-gateway:
