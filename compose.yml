name: tech-challenge-fase-03

services:

  keycloak:
    build:
      context: ./docker
      dockerfile: ./keycloak/Dockerfile.keycloak
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: root
    volumes:
      - ./docker/keycloak/realm:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /realms/master/.well-known/openid-configuration HTTP/1.1\r\nHost: localhost:8080\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q 'issuer'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks:
      - fase3net

  keycloak-init:
    build:
      context: ./docker
      dockerfile: ./keycloak/Dockerfile.keycloak
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      TARGET_REALM: tech-challenge
      TARGET_CLIENT_ID: orchestrator-service
      TARGET_ROLE: system
    volumes:
      - ./docker/keycloak/scripts:/opt/keycloak/scripts:ro
    entrypoint: ["/bin/bash", "/opt/keycloak/scripts/configure-service-account-role.sh"]
    restart: "no"
    networks:
      - fase3net

  keycloak-db:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fase3net

  auth-service-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth-service-db
    volumes:
      - auth-service-db_data:/var/lib/postgresql/data
    networks:
      - fase3net

  client-service-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: client-service-db
    volumes:
      - client-service-db_data:/var/lib/postgresql/data
    networks:
      - fase3net

  catalog-service-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: catalog-service-db
    volumes:
      - catalog-service-db_data:/var/lib/postgresql/data
    networks:
      - fase3net

  order-service-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: order-service-db
    volumes:
      - order-service-db_data:/var/lib/postgresql/data
    networks:
      - fase3net

  payment-service-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment-service-db
    volumes:
      - payment-service-db_data:/var/lib/postgresql/data
    networks:
      - fase3net

  restaurant-service-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: restaurant-service-db
    volumes:
      - restaurant-service-db_data:/var/lib/postgresql/data
    networks:
      - fase3net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: >
        -rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    networks:
      - fase3net

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://127.0.0.1:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - fase3net

  akhq:
    image: tchiotludo/akhq:latest
    container_name: akhq
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            docker-kafka:
              properties:
                bootstrap.servers: "kafka:9092"
    networks:
      - fase3net

  procpag:
    image: docker.io/erickemprobr/procpag:latest
    platform: linux/amd64
    ports:
      - "8089:8089"
    networks:
      - fase3net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fase3net

  service-registry:
    build:
      context: .
      dockerfile: ./service-registry/Dockerfile
    ports:
      - "8762:8762"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8762/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fase3net

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    ports:
      - "8761:8761"
    networks:
      - fase3net
    depends_on:
      service-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    networks:
      - fase3net
    depends_on:
      auth-service-db:
        condition: service_started
      service-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  client-service:
    build:
      context: .
      dockerfile: ./client-service/Dockerfile
    networks:
      - fase3net
    depends_on:
      client-service-db:
        condition: service_started
      service-registry:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  catalog-service:
    build:
      context: .
      dockerfile: ./catalog-service/Dockerfile
    networks:
      - fase3net
    ports:
      - "5006:5005"
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    depends_on:
      catalog-service-db:
        condition: service_started
      service-registry:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile
    ports:
      - "5007:5005"
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    networks:
      - fase3net
    depends_on:
      order-service-db:
        condition: service_started
      service-registry:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: ./payment-service/Dockerfile
    networks:
      - fase3net
    depends_on:
      payment-service-db:
        condition: service_started
      service-registry:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_healthy

  restaurant-service:
    build:
      context: .
      dockerfile: ./restaurant-service/Dockerfile
    networks:
      - fase3net
    depends_on:
      restaurant-service-db:
        condition: service_started
      service-registry:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_healthy

  orchestrator-service:
    build:
      context: .
      dockerfile: ./orchestrator-service/Dockerfile
    networks:
      - fase3net
    ports:
      - "5005:5005"
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    depends_on:
      service-registry:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_healthy
      keycloak-init:
        condition: service_completed_successfully

networks:
  fase3net:

volumes:
  auth-service-db_data:
  client-service-db_data:
  catalog-service-db_data:
  order-service-db_data:
  payment-service-db_data:
  restaurant-service-db_data:
  keycloak_db_data:
