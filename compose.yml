services:

  keycloak:
    #image: quay.io/keycloak/keycloak:21.1
    build:
      context: ./containers-config
      dockerfile: ./keycloak/Dockerfile.keycloak
    command: start-dev --import-realm
    ports:
      - 8000:8080
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=root
      - KC_DB_PASSWORD=root
      - KC_IMPORT_REALM=realm-export.json
    volumes:
      - ./containers-config/keycloak/realm:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - fase3net
  
  keycloak-db:
    image: postgres:15
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fase3net

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: techchallenge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fase3net

  procpag:
    # image: docker.io/erickemprobr/procpag:latest
    # https://github.com/proferickmuller/go-procpag
    # image: go-procpag
    image: docker.io/erickemprobr/procpag:latest
    platform: linux/amd64
    ports: 
    - "8089:8089"
    networks:
    - fase3net

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    ports:
      - "8761:8761"
    networks:
      - fase3net
    depends_on:
      - postgres

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    networks:
      - fase3net
    depends_on:
      - postgres

  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile
    networks:
      - fase3net
    depends_on:
      - postgres

  payment-service:
    build:
      context: .
      dockerfile: ./payment-service/Dockerfile
    networks:
      - fase3net
    depends_on:
      - postgres

  restaurant-service:
    build:
      context: .
      dockerfile: ./restaurant-service/Dockerfile
    networks:
      - fase3net
    depends_on:
      - postgres

networks:
  fase3net:

volumes:
  postgres_data:
  keycloak_db_data:
